name: Build OctopusIMMultiPush Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" \
            || true
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup Theos environment
        run: |
          export THEOS=${{ env.THEOS }}
          ls -la "$THEOS/makefiles/" || echo "makefiles not found"
          ls -la "$THEOS/lib/" || echo "lib not found"

      - name: Build Tweak
        run: |
          export THEOS=${{ env.THEOS }}
          make clean
          make FINALPACKAGE=1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctopusIMMultiPush-${{ github.sha }}
          path: |
            .theos/obj/debug/OctopusIMMultiPush.dylib
            .theos/packages/*.deb
          if-no-files-found: warn
          retention-days: 30

  build-standalone:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install iOS SDK dependencies
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build with raw clang (standalone)
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          CLANG=$(xcrun --sdk iphoneos --find clang)
          echo "SDK: $SDK_PATH"
          echo "Clang: $CLANG"
          mkdir -p build

          # 尝试获取 logos 预处理器
          LOGOS_PL=""
          if [ -f "${{ env.THEOS }}/bin/logos.pl" ]; then
            LOGOS_PL="${{ env.THEOS }}/bin/logos.pl"
          fi

          if [ -n "$LOGOS_PL" ]; then
            echo "Using Logos preprocessor: $LOGOS_PL"
            perl "$LOGOS_PL" Tweak.xm > build/Tweak.m 2>&1 || cp Tweak.xm build/Tweak.m
          else
            echo "No Logos preprocessor found, copying as-is"
            cp Tweak.xm build/Tweak.m
          fi

          $CLANG \
            -arch arm64 \
            -isysroot "$SDK_PATH" \
            -target arm64-apple-ios15.0 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework Security \
            -F"$SDK_PATH/System/Library/Frameworks" \
            -F"$SDK_PATH/System/Library/PrivateFrameworks" \
            -install_name @executable_path/OctopusIMMultiPush.dylib \
            -o build/OctopusIMMultiPush.dylib \
            build/Tweak.m 2>&1

          echo "Build exit code: $?"

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctopusIMMultiPush-standalone-${{ github.sha }}
          path: build/OctopusIMMultiPush.dylib
          if-no-files-found: warn
          retention-days: 30
