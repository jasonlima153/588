name: Build OctopusIMMultiPush Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" \
            || true
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup Theos environment
        run: |
          export THEOS=${{ env.THEOS }}
          ls -la "$THEOS/makefiles/" || echo "makefiles not found"
          ls -la "$THEOS/lib/" || echo "lib not found"

      - name: Build Tweak
        run: |
          export THEOS=${{ env.THEOS }}
          make clean
          make FINALPACKAGE=1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctopusIMMultiPush-${{ github.sha }}
          path: |
            .theos/obj/debug/OctopusIMMultiPush.dylib
            .theos/packages/*.deb
          if-no-files-found: warn
          retention-days: 30
