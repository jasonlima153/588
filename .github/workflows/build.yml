name: Build OctopusIMMultiPush Tweak

on:
  push:
    branches: [ main ]
    paths:
      - 'OctopusIMMultiPush/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" \
            || true
          # 如果官方安装失败，手动克隆
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Setup Theos environment
        run: |
          export THEOS=${{ env.THEOS }}
          # 确保 NIC (Theos NIC) 可用
          if [ ! -f "$THEOS/bin/nic.pl" ]; then
            echo "Warning: NIC not found, continuing..."
          fi
          # 验证 Theos 结构
          ls -la "$THEOS/makefiles/" || echo "makefiles not found"
          ls -la "$THEOS/lib/" || echo "lib not found"

      - name: Build Tweak
        run: |
          cd OctopusIMMultiPush
          export THEOS=${{ env.THEOS }}
          # 使用 Theos 编译
          make clean
          make FINALPACKAGE=1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctopusIMMultiPush-${{ github.sha }}
          path: |
            OctopusIMMultiPush/.theos/obj/debug/OctopusIMMultiPush.dylib
            OctopusIMMultiPush/.theos/packages/*.deb
          if-no-files-found: warn
          retention-days: 30

  build-standalone:
    runs-on: macos-14
    needs: []  # 独立运行，不依赖 Theos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install iOS SDK dependencies
        run: |
          # 使用 xcode-select 确保正确的 SDK
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build with raw clang (standalone)
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          CLANG=$(xcrun --sdk iphoneos --find clang)

          echo "SDK: $SDK_PATH"
          echo "Clang: $CLANG"

          # 创建构建目录
          mkdir -p build

          # 编译 Tweak.xm 为 .xm (Logos) -> .m (Objective-C)
          # 使用 Theos 的 logos.pl 预处理器，如果没有则手动处理
          cd OctopusIMMultiPush

          # 尝试获取 logos 预处理器
          LOGOS_PL=""
          if [ -f "${{ env.THEOS }}/bin/logos.pl" ]; then
            LOGOS_PL="${{ env.THEOS }}/bin/logos.pl"
          elif command -v logos &> /dev/null; then
            LOGOS_PL=$(which logos)
          fi

          if [ -n "$LOGOS_PL" ]; then
            echo "Using Logos preprocessor: $LOGOS_PL"
            perl "$LOGOS_PL" Tweak.xm > build/Tweak.m 2>&1 || {
              echo "Logos preprocessing failed, trying alternative..."
              cp Tweak.xm build/Tweak.m
            }
          else
            echo "No Logos preprocessor found, copying as-is for manual processing"
            cp Tweak.xm build/Tweak.m
          fi

          cd ..

          # 编译为动态库
          $CLANG \
            -arch arm64 \
            -isysroot "$SDK_PATH" \
            -target arm64-apple-ios15.0 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework Security \
            -F"$SDK_PATH/System/Library/Frameworks" \
            -F"$SDK_PATH/System/Library/PrivateFrameworks" \
            -install_name @executable_path/OctopusIMMultiPush.dylib \
            -o build/OctopusIMMultiPush.dylib \
            build/Tweak.m 2>&1

          echo "Build exit code: $?"

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctopusIMMultiPush-standalone-${{ github.sha }}
          path: build/OctopusIMMultiPush.dylib
          if-no-files-found: warn
          retention-days: 30
