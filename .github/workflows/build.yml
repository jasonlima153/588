name: Build MultiPush Dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Set up iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Compile Dylib
      run: |
        export THEOS=$HOME/theos
        make clean package FINALPACKAGE=1

    - name: Find and Stage Dylib
      run: |
        mkdir -p out_artifact
        find .theos/obj/ -name "*.dylib" -exec cp {} out_artifact/ \;
        echo "=== 已找到并提取以下编译产物 ==="
        ls -la out_artifact/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OctopusIMMultiPush-Dylib
        path: out_artifact/
